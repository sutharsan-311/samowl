# samowl configuration
# All values here are defaults. CLI arguments override them at runtime.

# ROS2 topic names (required in topic mode; set via CLI or launch file)
topics:
  rgb: "/front_depth/rgb0/image"
  depth: "/front_depth/depth0/image_raw"
  camera_info: "/front_depth/rgb0/camera_info"

# ML model paths (relative to package share directory or absolute)
models:
  owl: "data/owlvit-base-patch32"
  owl_encoder: "data/owl_image_encoder_patch32.engine"
  image_encoder: "data/resnet18_image_encoder.engine"
  mask_decoder: "data/mobile_sam_mask_decoder.engine"

# Detection and segmentation parameters
detection:
  text: "hospital bed, table, chair, stretcher"
  threshold: 0.1        # OWL-ViT score threshold
  max_detections: 5    # Maximum detections to segment per frame after NMS
  mask_threshold: 0.0   # SAM logits threshold
  merge_radius: 0.35    # 3D radius in metres for merging same-label hotspots
  max_points: 50000     # Maximum masked points written to PCD

# System-level settings
system:
  python: "python3"
  work_dir: "/tmp/samowl"
  map_frame: "odom"
  room_id: "simulation_room"
  debug: true
  mode: "scan"                 # "live" or "scan"
  output_dir: "output_test"    # scan mode: directory for final JSON output
  scan_idle_timeout_ms: 5000   # scan mode: ms of silence before finalization

# Daemon process settings
daemon:
  socket: "/tmp/samowl/daemon.sock"
  startup_timeout_ms: 30000
  poll_interval_ms: 100

# Default output file names
outputs:
  mask: "mask.png"
  boundary: "boundary.png"
  depth_mask: "masked_depth.png"
  points: "object_points_map.pcd"
  hotspots: "hotspots.json"

# Depth sensor settings
depth:
  scale: 0.001  # Depth pixel to metres conversion factor
  min: 0.1      # Minimum valid depth in metres
  max: 10.0     # Maximum valid depth in metres

# Scene graph construction parameters
graph:
  near_threshold: 1.0      # C++ scan edge building + scene_graph_node.py
  match_threshold: 0.6     # scene_graph_node.py node merge
  create_threshold: 0.5    # scene_graph_node.py node creation
